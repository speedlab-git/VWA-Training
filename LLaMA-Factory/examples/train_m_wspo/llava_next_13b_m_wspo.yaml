### m-WSPO training config: LLaVA-Next 13B (strong) + LLaVA-1.5 7B (weak pair)
###
### Replace the placeholders marked <YOUR-...> before launching.
### See examples/train_m_wspo/README.md for a full walkthrough.

### model
model_name_or_path: llava-hf/llava-v1.6-vicuna-13b-hf
trust_remote_code: true

### method
stage: m_wspo
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 64
lora_alpha: 128

### m-WSPO specific (Eqs. 6, 8, 9, 10, 11)
mwspo_gamma:           0.1   # weak-to-strong regularization
mwspo_alpha:           0.5   # weight on L_img_WSPO
mwspo_beta_dpo:        1.0   # weight on L_DPO^m
mwspo_dpo_temperature: 0.1   # temperature inside sigma(.)

mwspo_weak_ref_model:     llava-hf/llava-1.5-7b-hf
mwspo_weak_aligned_model: <YOUR-ORG>/llava-1.5-7b-dpo-rlhfv

mwspo_neg_image_strategy: in_batch        # choices: [in_batch, pre_mined]
mwspo_cache_weak_logprobs: false
# mwspo_weak_logprob_cache: cache/rlhf_v_mwspo_weak_lp.parquet

### dataset
dataset: rlhf_v_mwspo
template: vicuna
cutoff_len: 2048
max_samples: 100000
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/llava_next_13b/m_wspo
overwrite_output_dir: true
plot_loss: true
logging_steps: 10
save_steps: 500
report_to: none  # choices: [none, wandb, tensorboard, swanlab]

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 5.0e-7
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
ddp_timeout: 180000000
deepspeed: examples/deepspeed/ds_z3_config.json
gradient_checkpointing: true
